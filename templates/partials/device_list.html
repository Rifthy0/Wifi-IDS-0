
<table class="w-full text-sm">
  <thead class="text-xs text-slate-400 uppercase bg-slate-800/50 sticky top-0">
    <tr>
      <th class="px-4 py-3">Status</th>
      <th class="px-4 py-3">Threat Score</th>
      <th class="px-4 py-3">Device Details</th>
      <th class="px-4 py-3">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for device in devices %}
    <tr class="border-b border-slate-700">
      <td class="px-4 py-3">{{ device.status.value }}</td>
      <td class="px-4 py-3">{{ device.threatScore }}</td>
      <td class="px-4 py-3">{{ device.mac }}</td>
      <td class="px-4 py-3">
        <button data-action="trust" data-device-id="{{ device.id }}">Trust</button>
        <button data-action="block" data-device-id="{{ device.id }}">Block</button>
        <button data-action="analyze" data-device-id="{{ device.id }}">Analyze</button>
      </td>
    </tr>
    {% else %}
    <tr><td colspan="4" class="text-center py-8 text-slate-500">No devices detected.</td></tr>
    {% endfor %}
  </tbody>
</table>
