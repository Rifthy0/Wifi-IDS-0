
{% extends "layout.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="flex justify-center items-center mb-8">
             <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary-500"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            <h1 class="text-3xl font-bold ml-3 text-white">Smart Wi-Fi IDS</h1>
        </div>
        <div class="bg-slate-800 border border-slate-700 rounded-lg shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-center text-white mb-6">Admin Login</h2>
            <form method="post" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-400">Email Address</label>
                    <div class="mt-1">
                        <input id="username" name="username" type="email" required class="appearance-none block w-full px-3 py-2 border border-slate-600 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm bg-slate-900 text-white">
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-400">Password</label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required class="appearance-none block w-full px-3 py-2 border border-slate-600 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary-500 focus:border-primary-500 sm:text-sm bg-slate-900 text-white">
                    </div>
                </div>
                {% if error %}
                <p class="text-sm text-red-500 text-center">{{ error }}</p>
                {% endif %}
                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                        Sign in
                    </button>
                </div>
            </form>
            <p class="mt-6 text-center text-xs text-slate-500">
                Demo: admin@wifi-ids.com / password123
            </p>
        </div>
    </div>
</div>
{% endblock %}
